name: Full Build

description: Builds, tests, and creates binaries that are ready for release.

inputs:
  version:
    description: 'Version number for the app'
    default: '0.0.0'
  archs:
    description: 'Architectures for the build'
    default: 'x64 arm64'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Install WiX v6
      shell: bash
      run: |
        dotnet tool install --global wix --version 6.0.*

    - name: Build
      shell: bash
      run: dotnet build

    - name: Test
      shell: bash
      run: dotnet test

    - name: Create Binaries
      shell: bash
      run: |
        for arch in ${{ inputs.archs }}; do
          dotnet publish ./SentryReplay/SentryReplay.csproj -o "publish/$arch" -c Release -f net10.0-windows --os win --arch $arch --self-contained -p:PublishSingleFile=true -p:DebugType=embedded -p:Version=${{ inputs.version }}
        done

    - name: Create Portable ZIPs
      shell: pwsh
      run: |
        $archs = "${{ inputs.archs }}".Split(" ")
        foreach ($arch in $archs) {
          Compress-Archive -Path "publish/$arch/*" -DestinationPath "publish/SentryReplay-${{ inputs.version }}-$arch.zip"
        }

    - name: Create MSI Installers
      shell: bash
      run: |
        for arch in ${{ inputs.archs }}; do
          wix build Package.wxs -arch $arch -d Version=${{ inputs.version }} -d Arch=$arch -o "publish/SentryReplay-${{ inputs.version }}-$arch.msi"
        done

    - uses: actions/upload-artifact@v7
      with:
        if-no-files-found: error
        path: |
          publish/*.zip
          publish/*.msi
